name: Run tests

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  CheckCoverage:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install Python
      run: uv python install

    - name: Install dependencies
      run: uv sync --locked --all-extras --dev

    - name: Set up Docker
      uses: docker/setup-buildx-action@v3

    - name: Start test databases
      run: |
        chmod +x ./tests/start-test-databases.sh
        ./tests/start-test-databases.sh

    - name: Run tests with coverage
      run: |
        uv run coverage run -m pytest -v
        uv run coverage xml
        uv run coverage report

    - name: Stop test databases
      if: always()
      run: |
        chmod +x ./tests/stop-test-databases.sh
        ./tests/stop-test-databases.sh

    - name: Generate HTML coverage report
      if: matrix.python-version == '3.10'
      run: uv run coverage html -d htmlcov

    - name: Generate coverage badge
      if: matrix.python-version == '3.10'
      run: uv run genbadge coverage -i coverage.xml -o coverage-badge.svg

    - name: Upload coverage report
      if: matrix.python-version == '3.10' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-report
        path: htmlcov

    - name: Upload coverage badge
      if: matrix.python-version == '3.10' && github.ref == 'refs/heads/main'
      uses: actions/upload-artifact@v7
      with:
        name: coverage-badge
        path: coverage-badge.svg

  deploy-pages:
    needs: CheckCoverage
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install and Build Docs
        working-directory: docs
        run: |
          npm install
          npm run build

      - name: Download coverage report
        uses: actions/download-artifact@v8
        with:
          name: coverage-report
          path: docs/dist/coverage
        continue-on-error: true

      - name: Download coverage badge
        uses: actions/download-artifact@v8
        with:
          name: coverage-badge
          path: docs/dist/coverage
        continue-on-error: true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: docs/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
